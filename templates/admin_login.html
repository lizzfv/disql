<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiSQL — Admin</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background-color: #161b22;
            border: 1px solid #2d3748;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
        }

        .login-box h1 {
            font-size: 1.4rem;
            color: #ffffff;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .login-box p {
            font-size: 0.8rem;
            color: #7d9ab5;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 32px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            color: #7d9ab5;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            background-color: #0d1117;
            border: 1px solid #2d3748;
            border-radius: 6px;
            color: #e6edf3;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            padding: 12px 14px;
            outline: none;
            margin-bottom: 20px;
        }

        input:focus {
            border-color: #4a5568;
        }

        button {
            width: 100%;
            background-color: #1f6feb;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 12px;
            font-size: 0.88rem;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: background-color 0.2s;
            margin-top: 4px;
        }

        button:hover { background-color: #1158c7; }

        .error {
            background-color: #1a0d0d;
            border: 1px solid #3d1a1a;
            border-radius: 6px;
            padding: 12px 14px;
            color: #ff7b72;
            font-size: 0.88rem;
            margin-bottom: 20px;
        }

        .volver {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 0.82rem;
            color: #7d9ab5;
            text-decoration: none;
        }

        .volver:hover { color: #e6edf3; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>DiSQL</h1>
        <p>Panel de administración</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <label>Usuario</label>
            <input type="text" name="usuario" autocomplete="off">
            <label>Contraseña</label>
            <input type="password" name="contrasena">
            <button type="submit">Entrar</button>
        </form>

        <a href="/" class="volver">Volver a DiSQL</a>
    </div>
</body>
</html>
